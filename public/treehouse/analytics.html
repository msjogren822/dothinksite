<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treehouse Analytics</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --bg-card: #1a1a2e;
            --text: #eee;
            --text-light: #aaa;
            --accent: #ff6b6b;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }
        h1, h2 { margin: 0 0 1rem 0; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 2rem; }
        .header p { color: var(--text-light); margin: 0; }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .stat-card .label {
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .section {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .section h2 {
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .keyword {
            background: rgba(255,107,107,0.15);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .keyword .count {
            color: var(--accent);
            font-weight: bold;
            margin-left: 0.3rem;
        }
        .source-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .source-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .source-bar {
            flex: 1;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .source-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.5s ease;
        }
        .source-name {
            min-width: 120px;
            font-weight: 500;
        }
        .source-count {
            min-width: 50px;
            text-align: right;
            color: var(--text-light);
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <a href="https://www.dothink.in/treehouse/" class="back-link">← Back to Trends</a>
    
    <div class="header">
        <h1>📊 Treehouse Analytics</h1>
        <p>What's been trending across all batches</p>
    </div>
    
    <div id="stats" class="stats-grid">
        <div class="stat-card"><div class="value" id="total-batches">—</div><div class="label">Batches</div></div>
        <div class="stat-card"><div class="value" id="total-topics">—</div><div class="label">Topics</div></div>
        <div class="stat-card"><div class="value" id="total-upvotes">—</div><div class="label">Upvotes</div></div>
        <div class="stat-card"><div class="value" id="total-downvotes">—</div><div class="label">Downvotes</div></div>
    </div>
    
    <div class="section">
        <h2>🔑 Top Keywords</h2>
        <div id="keywords" class="keyword-list"><div class="loading">Loading...</div></div>
        <p style="margin-top:1rem;">
            <a href="#" onclick="openWordcloud(); return false;" class="btn" style="background: var(--accent); color: white; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; display: inline-block;">🌐 Orbital View</a>
        </p>
    </div>
    
    <div class="section">
        <h2>📰 Source Distribution</h2>
        <div id="sources" class="source-list"><div class="loading">Loading...</div></div>
    </div>

    <script>
        async function loadAnalytics() {
            try {
                const res = await fetch('/.netlify/functions/treehouse-analytics');
                const data = await res.json();
                
                // Stats
                document.getElementById('total-batches').textContent = data.stats.totalBatches;
                document.getElementById('total-topics').textContent = data.stats.totalTopics;
                document.getElementById('total-upvotes').textContent = data.stats.totalUpvotes;
                document.getElementById('total-downvotes').textContent = data.stats.totalDownvotes;
                
                // Keywords
                const keywordsEl = document.getElementById('keywords');
                keywordsEl.innerHTML = data.topKeywords.map(k => 
                    `<span class="keyword">${k.word}<span class="count">${k.count}</span></span>`
                ).join('');
                
                // Sources
                const sourcesEl = document.getElementById('sources');
                const maxCount = Math.max(...data.sourceDistribution.map(s => s.count));
                sourcesEl.innerHTML = data.sourceDistribution.map(s => {
                    const pct = (s.count / maxCount) * 100;
                    return `
                        <div class="source-row">
                            <span class="source-name">${s.source}</span>
                            <div class="source-bar"><div class="source-fill" style="width:${pct}%"></div></div>
                            <span class="source-count">${s.count}</span>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                document.getElementById('keywords').innerHTML = '<div class="loading">Error loading analytics</div>';
                console.error(e);
            }
        }
        
        loadAnalytics();
    </script>
    
    <!-- Wordcloud modal (2D with depth) -->
    <div id="wordcloud-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000;">
        <button onclick="closeWordcloud();" style="position:absolute; top:20px; right:20px; background:#ff6b6b; border:none; color:white; padding:10px 20px; cursor:pointer; border-radius:4px; z-index:1100;">✕ Close</button>
        <div id="wordcloud-canvas" style="width:100%; height:100%;"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script>
    // Wordcloud modal controls - 3D WEBGL version
    let wordcloudP5 = null;
    function closeWordcloud() { 
        document.getElementById('wordcloud-modal').style.display = 'none'; 
        // Remove p5 instance to prevent mouse state leak
        if (wordcloudP5) { 
            wordcloudP5.remove(); 
            wordcloudP5 = null; 
            window.wordcloudLoaded = false; 
        }
    }
    function openWordcloud() { 
        document.getElementById('wordcloud-modal').style.display = 'block'; 
        if (!wordcloudP5) { 
            startWordcloud(); 
        } 
    }

    function startWordcloud() {
        const fallback = [
            {word:'ai',count:20},{word:'claude',count:12},{word:'gpt',count:18},{word:'security',count:8},{word:'verge',count:6},{word:'downloads',count:4},{word:'pentagon',count:3}
        ];
        
        wordcloudP5 = new p5(function(p) {
            let keywords = [];
            let wordTextures = [];
            
            p.setup = function() { 
                p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
                p.fetchKeywords(); 
            };
            p.fetchKeywords = function() {
                fetch('/.netlify/functions/treehouse-analytics')
                    .then(r=>r.json())
                    .then(d=>{ 
                        keywords = (d.topKeywords || fallback).slice(0,30);
                        createWordTextures(); 
                    })
                    .catch(e=>{ 
                        keywords = fallback.slice(0,30); 
                        createWordTextures(); 
                    });
            };
            
            function createWordTextures() {
                const maxCount = keywords.length>0?keywords[0].count:1;
                const colors = ['#ff6b6b','#4ecdc4','#ffe66d','#95e1d3','#aa96da','#fcbad3','#a8d8ea','#ff9a9e'];
                
                keywords.forEach((kw,i) => {
                    const size = p.map(kw.count,1,maxCount,14,48);
                    // Create off-screen canvas for this word
                    const txt = p.createGraphics(200, 60);
                    txt.background(0,0); // transparent
                    txt.noStroke();
                    // Glow
                    for(let g=2; g>0; g--){
                        txt.fill(p.red(p.color(colors[i%colors.length])), p.green(p.color(colors[i%colors.length])), p.blue(p.color(colors[i%colors.length])), 30);
                        txt.textSize(size + g*8);
                        txt.textStyle(p.BOLD);
                        txt.textAlign(p.CENTER,p.CENTER);
                        txt.text(kw.word, 100, 30);
                    }
                    // Main text
                    txt.fill(colors[i%colors.length]);
                    txt.textSize(size);
                    txt.textStyle(p.BOLD);
                    txt.textAlign(p.CENTER,p.CENTER);
                    txt.text(kw.word, 100, 30);
                    // Count
                    txt.fill(255, 200);
                    txt.textSize(size * 0.4);
                    txt.text(kw.count, 100, 48);
                    
                    // 3D position on sphere
                    const phi = Math.acos(-1 + (2*i)/keywords.length);
                    const theta = Math.sqrt(keywords.length*Math.PI) * phi;
                    const radius = 220;
                    
                    wordTextures.push({
                        tex: txt,
                        x: radius * Math.cos(theta) * Math.sin(phi),
                        y: radius * Math.sin(theta) * Math.sin(phi),
                        z: radius * Math.cos(phi),
                        size: size * 3.5
                    });
                });
            }
            
            p.draw = function(){ 
                p.background(30,32,40);
                if(!wordTextures.length){ 
                    p.fill(255); p.textAlign(p.CENTER,p.CENTER); p.textSize(18); p.text('Loading...',0,0); 
                    return; 
                }
                // Enable orbit with scroll zoom
                p.orbitControl(3, 3, 0.1);
                p.rotateY(p.frameCount * 0.001);
                
                wordTextures.forEach(w=>{
                    p.push();
                    p.translate(w.x, w.y, w.z);
                    p.rotateY(-p.frameCount * 0.001); // billboard
                    p.texture(w.tex);
                    p.noStroke();
                    p.plane(w.size, w.size * 0.3);
                    p.pop();
                });
                
                // Connections
                p.stroke(255, 12);
                p.strokeWeight(0.5);
                for(let i=0; i<wordTextures.length; i++){
                    for(let j=i+1; j<wordTextures.length; j++){
                        const d = p.dist(wordTextures[i].x,wordTextures[i].y,wordTextures[i].z, wordTextures[j].x,wordTextures[j].y,wordTextures[j].z);
                        if(d < 100){
                            p.stroke(255, p.map(d,0,100,25,0));
                            p.line(wordTextures[i].x,wordTextures[i].y,wordTextures[i].z, wordTextures[j].x,wordTextures[j].y,wordTextures[j].z);
                        }
                    }
                }
            };
            p.mouseWheel = function(e) {
                // Custom zoom
                return false;
            };
            p.windowResized = function(){ p.resizeCanvas(p.windowWidth, p.windowHeight); };
        }, 'wordcloud-canvas');
    }
    </script>
</body>
</html>
