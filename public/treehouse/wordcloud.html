<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treehouse Word Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        .close-btn {
            position: fixed; top: 20px; right: 20px;
            background: #ff6b6b; border: none; color: white;
            padding: 10px 20px; cursor: pointer; border-radius: 4px; z-index: 100;
        }
        .title {
            position: fixed; top: 20px; left: 20px;
            color: #eee; font-size: 18px; font-family: sans-serif; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="title">🌐 Orbital Word Cloud</div>
    <button class="close-btn" onclick="window.close()">✕ Close</button>
    <div id="canvas-container"></div>

    <script>
    new p5(function(p) {
        let keywords = [];
        let words = [];
        let angle = 0;
        
        p.setup = function() {
            p.createCanvas(p.windowWidth, p.windowHeight);
            
            p.fetch = function() {
                return fetch('/.netlify/functions/treehouse-analytics')
                    .then(res => res.json())
                    .then(data => {
                        keywords = data.topKeywords || [];
                        createWords();
                    })
                    .catch(err => console.error(err));
            };
            
            p.fetch();
        };
        
        function createWords() {
            const maxCount = keywords.length > 0 ? keywords[0].count : 1;
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#aa96da', '#fcbad3'];
            
            keywords.forEach((kw, i) => {
                const angle2 = (i / keywords.length) * p.TWO_PI * 2;
                const radius = 80 + (i / keywords.length) * 200;
                
                words.push({
                    word: kw.word,
                    count: kw.count,
                    x: p.cos(angle2) * radius,
                    y: p.sin(angle2) * radius,
                    size: p.map(kw.count, 1, maxCount, 14, 64),
                    color: colors[i % colors.length]
                });
            });
        }
        
        p.draw = function() {
            p.background(40, 44, 52);
            
            if (keywords.length === 0) {
                p.fill(255);
                p.textSize(24);
                p.textAlign(p.CENTER, p.CENTER);
                p.text('Loading...', p.width/2, p.height/2);
                return;
            }
            
            p.push();
            p.translate(p.width/2, p.height/2);
            p.rotate(angle);
            angle += 0.003;
            
            words.forEach(w => {
                p.push();
                p.translate(w.x, w.y);
                
                // Glow
                p.noStroke();
                for (let g = 3; g > 0; g--) {
                    p.fill(p.red(p.color(w.color)), p.green(p.color(w.color)), p.blue(p.color(w.color)), 25);
                    p.textSize(w.size + g * 4);
                    p.textStyle(p.BOLD);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text(w.word, 0, 0);
                }
                
                // Main text
                p.fill(w.color);
                p.textSize(w.size);
                p.textStyle(p.BOLD);
                p.textAlign(p.CENTER, p.CENTER);
                p.text(w.word, 0, 0);
                
                // Count
                p.fill(255, 180);
                p.textSize(w.size * 0.35);
                p.textStyle(p.NORMAL);
                p.text(w.count, 0, w.size * 0.7);
                
                p.pop();
            });
            
            p.pop();
            
            // Draw connections
            p.stroke(255, 25);
            p.strokeWeight(1);
            for (let i = 0; i < words.length; i++) {
                for (let j = i + 1; j < words.length; j++) {
                    const d = p.dist(words[i].x, words[i].y, words[j].x, words[j].y);
                    if (d < 80) {
                        const alpha = p.map(d, 0, 80, 40, 0);
                        p.stroke(255, alpha);
                        const cx = p.width/2, cy = p.height/2;
                        const ax = cx + words[i].x * p.cos(angle) - words[i].y * p.sin(angle);
                        const ay = cy + words[i].x * p.sin(angle) + words[i].y * p.cos(angle);
                        const bx = cx + words[j].x * p.cos(angle) - words[j].y * p.sin(angle);
                        const by = cy + words[j].x * p.sin(angle) + words[j].y * p.cos(angle);
                        p.line(ax, ay, bx, by);
                    }
                }
            }
        };
        
        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };
        
        p.mouseDragged = function() {
            angle += (p.mouseX - p.pmouseX) * 0.01;
            return false;
        };
        
        p.mouseWheel = function(event) {
            return false;
        };
    }, 'canvas-container');
    </script>
</body>
</html>
